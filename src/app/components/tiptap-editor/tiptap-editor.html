<div class="editor-wrapper">
  <div class="editor-toolbar">
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('bold')" (click)="exec((c) => c.toggleBold())" title="Negrita">
      <strong>B</strong>
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('italic')" (click)="exec((c) => c.toggleItalic())" title="Cursiva">
      <em>I</em>
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('strike')" (click)="exec((c) => c.toggleStrike())" title="Tachado">
      <s>S</s>
    </button>

    <span class="separator"></span>

    <button type="button" class="toolbar-btn" [class.is-active]="isActive('heading', { level: 1 })" (click)="exec((c) => c.toggleHeading({ level: 1 }))" title="Título 1">
      H1
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('heading', { level: 2 })" (click)="exec((c) => c.toggleHeading({ level: 2 }))" title="Título 2">
      H2
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('heading', { level: 3 })" (click)="exec((c) => c.toggleHeading({ level: 3 }))" title="Título 3">
      H3
    </button>

    <span class="separator"></span>

    <button type="button" class="toolbar-btn" [class.is-active]="isActive('bulletList')" (click)="exec((c) => c.toggleBulletList())" title="Lista">
      &bull;
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('orderedList')" (click)="exec((c) => c.toggleOrderedList())" title="Lista numerada">
      1.
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('blockquote')" (click)="exec((c) => c.toggleBlockquote())" title="Cita">
      &ldquo;
    </button>
    <button type="button" class="toolbar-btn" [class.is-active]="isActive('codeBlock')" (click)="exec((c) => c.toggleCodeBlock())" title="Código">
      &lt;/&gt;
    </button>

    <span class="separator"></span>

    <button type="button" class="toolbar-btn" (click)="exec((c) => c.undo())" title="Deshacer">
      &#8630;
    </button>
    <button type="button" class="toolbar-btn" (click)="exec((c) => c.redo())" title="Rehacer">
      &#8631;
    </button>
  </div>
  <div #editorEl class="editor-content"></div>
</div>
